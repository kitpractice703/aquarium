# ─────────────────────────────────────────────────────────────────
# 테스트 전용 설정 (src/test/resources/application.properties)
# - @WebMvcTest : SecurityConfig 에서 필요한 cors.allowed-origins 주입
# - @DataJpaTest: H2 MySQL 호환 모드(ENUM 컬럼 지원)로 스키마 생성
# ─────────────────────────────────────────────────────────────────

# CORS (SecurityConfig @Value 주입용)
cors.allowed-origins=http://localhost

# H2 MySQL 호환 모드 – ENUM 컬럼 정의(Program.type)를 처리하기 위해 필요
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;NON_KEYWORDS=VALUE
spring.jpa.hibernate.ddl-auto=create-drop

# Google OAuth2 자격증명 – SecurityConfig oauth2Login() 초기화 시 필요한 최소값
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile
